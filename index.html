<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La pêche au toc : sa technique et ses passionnés</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--primary); }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .form-section { background: white; padding: 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .input-group { display: flex; gap: 10px; max-width: 800px; margin: 0 auto; flex-wrap: wrap; }
        input { padding: 12px; border: 2px solid #ddd; border-radius: 25px; flex: 1; min-width: 150px; outline: none; }
        button { padding: 12px 25px; background: var(--accent); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        #map { height: 500px; width: 100%; }
        .stats-section { padding: 30px; max-width: 1000px; margin: 0 auto; text-align: center; }
        .region-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .region-card { background: white; padding: 20px; border-radius: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-bottom: 4px solid var(--accent); }
        .region-card:hover { transform: translateY(-3px); transition: 0.2s; background: #eee; }
        /* Modal */
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 10% auto; padding: 20px; width: 80%; max-width: 500px; border-radius: 10px; position: relative; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 25px; cursor: pointer; }
        .city-list { max-height: 300px; overflow-y: auto; text-align: left; margin-top: 15px; }
        .city-name { font-weight: bold; color: var(--accent); margin-top: 10px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<header><h1>La pêche au toc : sa technique et ses passionnés</h1></header>

<div class="form-section">
    <div class="input-group">
        <input type="text" id="pseudo" placeholder="Votre Pseudo">
        <input type="text" id="city" placeholder="Ville ou Code Postal">
        <button onclick="ajouterMembre()">M'ajouter à la carte</button>
    </div>
</div>

<div id="map"></div>

<div class="stats-section">
    <h2>Classement par Secteur</h2>
    <div id="regionGrid" class="region-grid">
        <p>Chargement des données...</p>
    </div>
</div>

<div id="myModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <div id="modalBody" class="city-list"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>

<script>
    const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbxbYCgCpy-EONxOZX5WveysEamBoMLzF7Fm9HXdCEIdx76W5mZx95J_4Ry6he4uC5FR/exec"; // <--- VERIFIE BIEN CETTE URL

    var map = L.map('map', { scrollWheelZoom: false }).setView([46.6, 2.2], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var markers = L.markerClusterGroup();
    map.addLayer(markers);

    async function loadData() {
        if (URL_SCRIPT.includes("TON_URL")) return;
        try {
            const response = await fetch(URL_SCRIPT);
            const data = await response.json();

            markers.clearLayers();
            let stats = {};

            data.forEach(item => {
                // Ajouter sur la carte
                const marker = L.marker([item.lat, item.lon]).bindPopup(`<b>${item.pseudo}</b><br>${item.ville}`);
                markers.addLayer(marker);

                // Trier pour le classement (Département)
                let dep = item.ville.match(/\d{2}/) ? "Dép. " + item.ville.match(/\d{2}/)[0] : "Autres";
                if (!stats[dep]) stats[dep] = {};
                if (!stats[dep][item.ville]) stats[dep][item.ville] = [];
                stats[dep][item.ville].push(item.pseudo);
            });

            renderStats(stats);
        } catch (e) {
            console.error(e);
            document.getElementById('regionGrid').innerHTML = "Aucune donnée pour le moment.";
        }
    }

    function renderStats(stats) {
        const grid = document.getElementById('regionGrid');
        grid.innerHTML = "";
        const sortedDeps = Object.keys(stats).sort();

        if (sortedDeps.length === 0) {
            grid.innerHTML = "<p>La carte est vide pour l'instant.</p>";
            return;
        }

        sortedDeps.forEach(dep => {
            let count = Object.values(stats[dep]).flat().length;
            const card = document.createElement('div');
            card.className = 'region-card';
            card.innerHTML = `<b>${dep}</b><br>${count} membre(s)`;
            card.onclick = () => openModal(dep, stats[dep]);
            grid.appendChild(card);
        });
    }

    function openModal(title, cityData) {
        document.getElementById('modalTitle').innerText = title;
        const body = document.getElementById('modalBody');
        body.innerHTML = "";
        for (let ville in cityData) {
            body.innerHTML += `<div class="city-name">${ville}</div><div>${cityData[ville].join(', ')}</div>`;
        }
        document.getElementById('myModal').style.display = "block";
    }

    function closeModal() { document.getElementById('myModal').style.display = "none"; }

    async function ajouterMembre() {
        const pseudo = document.getElementById('pseudo').value.trim();
        const city = document.getElementById('city').value.trim();

        if (!pseudo || !city) return alert("Pseudo et Ville obligatoires !");

        const geoResp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(city)},France`);
        const geoData = await geoResp.json();

        if (geoData.length > 0) {
            const lat = geoData[0].lat;
            const lon = geoData[0].lon;

            // Envoi POST
            await fetch(URL_SCRIPT, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({ pseudo, ville: city, lat, lon })
            });

            alert("Bienvenue sur la carte !");
            document.getElementById('pseudo').value = "";
            document.getElementById('city').value = "";
            loadData(); // On recharge tout
        } else {
            alert("Ville introuvable.");
        }
    }

    window.onload = loadData;
</script>
</body>
</html>
